version: '3.8'

services:
  lottery-app:
    build: .
    container_name: lottery_predictor
    volumes:
      - ./data:/app/data
      - ./model:/app/model
      - ./analysis_output:/app/analysis_output
    environment:
      - TZ=Asia/Shanghai
    command: >
      bash -c "python get_data.py --name ssq && 
               python run_train_model_optimized.py --name ssq && 
               python analyzer.py --name ssq --plot --report && 
               python run_predict_enhanced.py --name ssq --strategy hybrid"
